<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Barbera Michelle | Tarjeta Digital</title>
    <meta name="description" content="Tarjeta de presentación de Michelle. Conoce mis servicios y contáctanos.">
    <link rel="canonical" href="https://barberamichelle.github.io/">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://barberamichelle.github.io/">
    <meta property="og:title" content="Barbera Michelle | Tarjeta Digital">
    <meta property="og:description" content="Tarjeta de presentación digital de Barbera Michelle.">
    <meta property="og:image" content="assets/images/logo.webp">
    <link rel="icon" href="assets/images/favicon.icon.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="styles.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-46KCJW753M"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-46KCJW753M');
    </script>
</head>

<body>
    <!-- Video de fondo -->
    <video class="video-background" autoplay loop muted playsinline>
        <source src="assets/videos/fondo-michelle.mp4" type="video/mp4">
    </video>

    <main class="main-container">
        <article class="profile-card">

            <div class="profile-header">
                <img src="assets/images/logo.webp" alt="Tarjeta de Presentación Barbera Michelle" class="profile-logo"
                    fetchpriority="high" decoding="async">
            </div>

            <div class="profile-body">
                <h1 class="profile-title">Barbera Michelle</h1>
                <p class="profile-description">
                    Profesionista con años de trayectora en el corte y cuidado del cabello. Conecta conmigo y conoce mis
                    servicios.
                </p>
            </div>

            <div class="profile-cta">
                <a href="agendar.html" class="cta-button" target="_blank" rel="noopener noreferrer">
                    AGENDAR CITA
                </a>
            </div>

            <nav class="social-bar">
                <a href="https://www.instagram.com/ellecutzz_?igsh=NXBvZWphamV2Zjh6&utm_source=qr"
                    class="social-link instagram" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://wa.link/3k0qbf" class="social-link whatsapp" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-whatsapp"></i>
                </a>
                <a href="https://share.google/8CTqs9oIM6xmZ9MC3" class="social-link location" target="_blank"
                    rel="noopener noreferrer">
                    <i class="fas fa-map-marker-alt"></i>
                </a>
            </nav>
        </article>
    </main>

    <script>
        const GITHUB_USER = "michelle"; // CAMBIA ESTO

        async function trackClick(platform) {
            // 1. Registro en Google Analytics 4 (Métrica con Fechas)
            if (typeof gtag === 'function') {
                gtag('event', 'click_social', {
                    'plataforma': platform
                });
            }

            try {
                // 2. Registro en CounterAPI (Odómetro Total)
                await fetch(`https://api.counterapi.dev/v1/${GITHUB_USER}/${platform}/up`, {
                    keepalive: true,
                    mode: 'no-cors'
                });
            } catch (error) {
                // Falla silenciosa: si hay AdBlock, la página sigue funcionando perfecto
            }
        }

        // Debounce para evitar clics accidentales múltiples
        function debounce(func, wait) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        document.querySelectorAll('.social-link, .cta-button').forEach(el => {
            el.addEventListener('click', debounce((e) => {
                // Usamos 'el' en lugar de 'e.currentTarget' porque el evento expira tras el timeout
                const platform = el.classList.contains('cta-button')
                    ? 'agendar'
                    : el.className.split(' ')[1];

                trackClick(platform);
            }, 300));
        });
    </script>
</body>

</html>
